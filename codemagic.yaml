workflows:
  android-release:
    name: EasyRise Android Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Ensure gradlew is executable
        script: chmod +x android/gradlew
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build AAB (release, signed) for Play Store
        script: |
          flutter build appbundle --release
      - name: Build APK (release, signed) for sideload testing
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.aab
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/mapping.txt
    publishing:
      email:
        recipients: []
